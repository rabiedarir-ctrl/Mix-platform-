name: Fix Project Paths

on:
  workflow_dispatch:   # تشغيل يدوي من GitHub
  push:                # أو عند كل رفع (اختياري)
    branches:
      - main

jobs:
  fix-paths:
    runs-on: ubuntu-latest

    steps:
      # 1. جلب الكود
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. إعداد Git
      - name: Configure Git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # 3. إصلاح المسارات (عدّلها حسب مشروعك)
      - name: Fix paths in project
        run: |
          echo "Fixing paths..."

          # مثال 1: pages -> JS
          grep -rl "pages/" . | xargs sed -i 's|pages/|JS/|g' || true

          # مثال 2: css path correction (اختياري)
          grep -rl "css/" . | xargs sed -i 's|css/|frontend/static/css/|g' || true

          # مثال 3: images path correction (اختياري)
          grep -rl "images/" . | xargs sed -i 's|images/|assets/images/|g' || true

      # 4. التحقق من وجود تغييرات
      - name: Check changes
        run: |
          git status

      # 5. commit التعديلات إذا وجدت
      - name: Commit changes
        run: |
          git add .

          git commit -m "Auto fix project paths" || echo "No changes to commit"

      # 6. رفع التعديلات
      - name: Push changes
        run: |
          git push origin main
