<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - Mix Platform</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header>
        <h1>تسجيل الدخول إلى Mix Platform</h1>
    </header>

    <main>
        <section id="login-section">
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">البريد الإلكتروني</label>
                    <input type="email" id="email" name="email" required placeholder="أدخل بريدك الإلكتروني">
                </div>

                <div class="form-group">
                    <label for="password">كلمة المرور</label>
                    <input type="password" id="password" name="password" required placeholder="أدخل كلمة المرور">
                </div>

                <button type="submit">تسجيل الدخول</button>
            </form>

            <p>لا تملك حسابًا؟ <a href="register.html">أنشئ حسابك هنا</a></p>
        </section>

        <section id="login-feedback">
            <p id="feedback" style="color:red;"></p>
        </section>
    </main>

    <footer>
        <p>© 2026 Mix Platform. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="static/api.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const feedback = document.getElementById('feedback');

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            try {
                const response = await fetch(`${MIX_API_BASE}/users/login`, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                if (response.ok) {
                    // حفظ التوكن في localStorage
                    localStorage.setItem("mixToken", data.token);
                    window.location.href = "dashboard.html";
                } else {
                    feedback.textContent = data.message || "خطأ في تسجيل الدخول";
                }
            } catch (err) {
                feedback.textContent = "تعذر الاتصال بالخادم";
                console.error(err);
            }
        });
    </script>
</body>
  </html>
