<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة التحكم - Mix Platform</title>
    <link rel="stylesheet" href="static/style.css">
</head>
<body>
    <header>
        <h1>لوحة التحكم الخاصة بك</h1>
        <nav>
            <a href="feed.html">التغذية</a>
            <a href="messages.html">الرسائل</a>
            <a href="games.html">الألعاب</a>
            <a href="dream_world.html">عالم الأحلام</a>
            <button id="logoutBtn">تسجيل الخروج</button>
        </nav>
    </header>

    <main>
        <section id="user-stats">
            <h2>الطاقة والخلايا</h2>
            <div class="stats-cards">
                <div class="card">
                    <h3>الطاقة</h3>
                    <p id="energy">جارٍ التحميل...</p>
                </div>
                <div class="card">
                    <h3>الخلايا</h3>
                    <p id="cells">جارٍ التحميل...</p>
                </div>
                <div class="card">
                    <h3>النقاط</h3>
                    <p id="score">جارٍ التحميل...</p>
                </div>
            </div>
        </section>

        <section id="notifications">
            <h2>الإشعارات</h2>
            <ul id="notificationsList">
                <li>جارٍ التحميل...</li>
            </ul>
        </section>

        <section id="dream-world-preview">
            <h2>عالم الأحلام</h2>
            <button onclick="location.href='dream_world.html'">استكشف عالم الأحلام</button>
        </section>

        <section id="games-preview">
            <h2>الألعاب</h2>
            <button onclick="location.href='games.html'">ابدأ اللعب</button>
        </section>
    </main>

    <footer>
        <p>© 2026 Mix Platform. جميع الحقوق محفوظة.</p>
    </footer>

    <script src="static/api.js"></script>
    <script src="static/dashboard.js"></script>
    <script>
        // تسجيل الخروج
        const logoutBtn = document.getElementById('logoutBtn');
        logoutBtn.addEventListener('click', () => {
            localStorage.removeItem("mixToken");
            window.location.href = "login.html";
        });

        // تحميل بيانات المستخدم
        async function loadUserData() {
            const token = localStorage.getItem("mixToken");
            if (!token) return window.location.href = "login.html";

            try {
                const response = await fetch(`${MIX_API_BASE}/users/me`, {
                    headers: { "Authorization": `Bearer ${token}` }
                });
                const data = await response.json();

                if (response.ok) {
                    document.getElementById('energy').textContent = data.energy;
                    document.getElementById('cells').textContent = data.cells;
                    document.getElementById('score').textContent = data.score;

                    const notifList = document.getElementById('notificationsList');
                    notifList.innerHTML = '';
                    if (data.notifications && data.notifications.length) {
                        data.notifications.forEach(n => {
                            const li = document.createElement('li');
                            li.textContent = `[${n.type}] ${n.message}`;
                            notifList.appendChild(li);
                        });
                    } else {
                        notifList.innerHTML = '<li>لا توجد إشعارات حالياً</li>';
                    }
                } else {
                    console.error(data.message);
                }
            } catch (err) {
                console.error("خطأ في تحميل بيانات المستخدم", err);
            }
        }

        loadUserData();
    </script>
</body>
          </html>
