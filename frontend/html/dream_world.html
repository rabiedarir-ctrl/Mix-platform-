<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عالم الأحلام - Mix Platform</title>
    <link rel="stylesheet" href="static/style.css">
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; height: 100%; }
        #dreamContainer { width: 100%; height: 100vh; display: block; background: black; }
        #hud { position: absolute; top: 10px; left: 10px; color: white; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="hud">
        <button id="backBtn">العودة للوحة التحكم</button>
        <span id="dreamStatus">جاري تحميل الأحلام...</span>
    </div>
    <div id="dreamContainer"></div>

    <script src="static/api.js"></script>
    <script src="static/three/engine.js"></script>
    <script src="static/dream_engine.js"></script>
    <script>
        const token = localStorage.getItem("mixToken");
        if (!token) window.location.href = "login.html";

        const backBtn = document.getElementById('backBtn');
        backBtn.addEventListener('click', () => {
            window.location.href = "dashboard.html";
        });

        const dreamContainer = document.getElementById('dreamContainer');
        const dreamStatus = document.getElementById('dreamStatus');

        // ===========================
        // 🔹 إعداد محرك Three.js
        // ===========================
        const dreamEngine = new THREE.Engine(dreamContainer);

        // تحميل عالم الأحلام
        dreamEngine.loadWorld('dreamWorld');

        // بدء الحلقة الرئيسية
        dreamEngine.start();

        // ===========================
        // 🔹 دمج Dream Engine مع Backend
        // ===========================
        const dreamManager = new DreamEngine(dreamEngine, token);
        window.dreamEngineInstance = dreamManager;
      
        async function loadDreams() {
            try {
                await dreamManager.init();
                dreamStatus.textContent = 'الأحلام جاهزة للعرض';
            } catch (err) {
                dreamStatus.textContent = 'تعذر تحميل الأحلام';
                console.error(err);
            }
        }

        loadDreams();

        // ===========================
        // 🔹 التحديث الدوري للأحلام والتفاعلات
        // ===========================
        setInterval(() => {
            dreamManager.update();
        }, 1000);

    </script>
</body>
</html>
