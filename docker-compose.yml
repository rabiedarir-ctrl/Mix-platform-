version: "3.9"

services:
  mix-backend:
    container_name: mix_backend
    build:
      context: .
      dockerfile: Dockerfile
    restart: always

    ports:
      - "${BACKEND_PORT}:3000"

    environment:
      - NODE_ENV=${NODE_ENV}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN}
      - API_BASE=${API_BASE}

    volumes:
      - .:/app
      - ./storage:/app/storage
      - ./logs:/app/logs

    working_dir: /app/backend

    command: ["node", "server.js"]

    depends_on:
      - mix-storage

  mix-storage:
    container_name: mix_storage
    image: busybox
    restart: always

    volumes:
      - ./storage:/storage

    command: ["sh", "-c", "while true; do sleep 3600; done"]

  mix-frontend:
    container_name: mix_frontend
    image: nginx:alpine
    restart: always

    ports:
      - "${FRONTEND_PORT:-8080}:80"

    volumes:
      - ./frontend:/usr/share/nginx/html:ro

    depends_on:
      - mix-backend
